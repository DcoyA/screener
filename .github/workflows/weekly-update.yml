name: Weekly JSON Update

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
      KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
      KRX_KOSPI_BASIC_URL: ${{ vars.KRX_KOSPI_BASIC_URL }}
      KRX_KOSDAQ_BASIC_URL: ${{ vars.KRX_KOSDAQ_BASIC_URL }}
      KRX_KOSPI_DAILY_URL: ${{ vars.KRX_KOSPI_DAILY_URL }}
      KRX_KOSDAQ_DAILY_URL: ${{ vars.KRX_KOSDAQ_DAILY_URL }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        run: python scripts/update_data.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/data/*.json
          git diff --cached --quiet || git commit -m "auto update json data"
          git push
